<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<title>诊断问卷</title>
<style>
:root{--primary:#1a365d;--primary-l:#2c5282;--accent:#0d9488;--bg:#f8fafc;--card:#fff;--text:#1a202c;--text-l:#64748b;--border:#e2e8f0;--error:#dc2626;--radius:14px;--shadow:0 4px 20px rgba(26,54,93,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.mode-select{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.mode-select h1{font-size:1.6rem;color:var(--primary);margin-bottom:.3rem;letter-spacing:.1em}
.mode-select p{color:var(--text-l);font-size:.9rem;margin-bottom:2rem;text-align:center}
.mode-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;max-width:500px;width:100%}
.mode-btn{flex:1;min-width:200px;background:var(--card);border:2px solid var(--border);border-radius:16px;padding:1.8rem 1.2rem;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.mode-btn:hover{border-color:var(--primary-l);transform:translateY(-3px)}
.mode-btn .icon{font-size:2.5rem;margin-bottom:.5rem}
.mode-btn h3{font-size:1.1rem;color:var(--primary);margin-bottom:.3rem}
.mode-btn .desc{font-size:.8rem;color:var(--text-l)}
.app{max-width:680px;margin:0 auto;padding:0 0 4rem}
.app-header{background:var(--primary);color:#fff;padding:1.5rem 1rem 1.2rem;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.app-header h1{font-size:1.2rem;letter-spacing:.1em}
.app-header .sub{font-size:.75rem;opacity:.7;margin-top:.2rem}
.section{background:var(--card);margin:.8rem .8rem 0;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.section-title{background:#f1f5f9;padding:.7rem 1rem;font-size:.95rem;font-weight:700;color:var(--primary);border-bottom:2px solid var(--border)}
.section-body{padding:.8rem 1rem}
.q{margin-bottom:1.2rem}
.q:last-child{margin-bottom:0}
.q-text{font-size:.9rem;font-weight:600;margin-bottom:.5rem;line-height:1.5}
.q-num{color:var(--accent);margin-right:.3rem}
.q-hint{font-size:.75rem;color:#94a3b8;margin-bottom:.4rem}
.choice{display:flex;align-items:center;padding:.5rem .6rem;border:1.5px solid var(--border);border-radius:10px;margin-bottom:.4rem;cursor:pointer;transition:all .15s;user-select:none}
.choice:hover{border-color:var(--primary-l)}
.choice input{margin-right:.5rem;width:18px;height:18px;accent-color:var(--primary);flex-shrink:0}
.choice input:checked + span{font-weight:700;color:var(--primary)}
.choice.checked{border-color:var(--primary);background:rgba(26,54,93,.05)}
.choice-row{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.choice-row .choice{margin-bottom:0}
.input-text{width:100%;padding:.5rem .6rem;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;background:#fdfdff;color:var(--text)}
.input-text:focus{outline:none;border-color:var(--primary-l);box-shadow:0 0 0 2px rgba(44,82,130,.1)}
textarea.input-text{min-height:80px;resize:vertical;font-family:inherit;line-height:1.5}
.input-row{display:flex;gap:.5rem;align-items:center}
.input-row .input-text{flex:1}
.input-row .unit{font-size:.85rem;color:var(--text-l);white-space:nowrap}
.input-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}
@media(max-width:400px){.input-grid{grid-template-columns:1fr 1fr}.choice-row{grid-template-columns:1fr}}
.submit-bar{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--border);padding:.8rem;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.btn-submit{width:100%;padding:.8rem;border:none;border-radius:10px;font-size:1rem;font-weight:700;color:#fff;background:var(--primary);cursor:pointer;box-shadow:0 4px 12px rgba(26,54,93,.15);transition:all .2s}
.btn-submit:hover{background:var(--primary-l)}
.btn-submit:disabled{opacity:.5}
.result-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center}
.result-overlay.show{display:flex}
.result-box{background:#fff;width:100%;max-width:680px;border-radius:16px 16px 0 0;padding:1.2rem;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.result-box h3{font-size:1.1rem;color:var(--primary);margin-bottom:.5rem}
.result-box .info{font-size:.8rem;color:var(--text-l);margin-bottom:.8rem;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:.5rem .7rem}
.result-box textarea{width:100%;min-height:200px;border:1.5px solid var(--border);border-radius:8px;padding:.6rem;font-size:.78rem;font-family:monospace;line-height:1.5;resize:vertical;background:#fdfdff}
.result-actions{display:flex;gap:.5rem;margin-top:.8rem;flex-wrap:wrap}
.result-actions button{flex:1;padding:.7rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;min-width:120px}
.btn-copy{background:var(--accent);color:#fff}
.btn-close{background:var(--border);color:var(--text)}
.btn-link{background:#6366f1;color:#fff}
.link-box{margin-top:.8rem;display:none}
.link-box.show{display:block}
.link-box input{width:100%;padding:.5rem;border:1.5px solid var(--accent);border-radius:8px;font-size:.78rem;background:#f0fdfa}
.link-box .link-hint{font-size:.75rem;color:var(--text-l);margin-bottom:.4rem}
.toast{position:fixed;bottom:30%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.85rem;z-index:10000;display:none}
.toast.show{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.back-link{display:inline-block;margin:.8rem;color:var(--primary);font-size:.85rem;font-weight:600;text-decoration:none}
</style>
</head>
<body>

<div id="modePage" class="mode-select">
<h1>📋 诊断问卷</h1>
<p>选择问卷类型，在手机上直接填写<br>填完提交，老师审阅后发送报告</p>
<div class="mode-btns">
<div class="mode-btn" onclick="showForm('child')">
<div class="icon">🌱</div>
<h3>孩子版</h3>
<p class="desc">家长填写<br>了解孩子性格与问题</p>
</div>
<div class="mode-btn" onclick="showForm('adult')">
<div class="icon">🧭</div>
<h3>成人版</h3>
<p class="desc">本人填写<br>了解自己的性格与困惑</p>
</div>
<div class="mode-btn" onclick="showForm('teacher')">
<div class="icon">📚</div>
<h3>教师版</h3>
<p class="desc">教师本人填写<br>了解教学风格与压力应对</p>
</div>
</div>
</div>

<div id="formPage" class="app" style="display:none">
<div class="app-header">
<a class="back-link" href="javascript:backToMode()" style="color:rgba(255,255,255,.8)">← 重新选择</a>
<h1 id="formTitle">家庭教育问题诊断问卷</h1>
<div class="sub">越真实，诊断越准 · 填完点底部按钮提交</div>
</div>
<div id="questions"></div>
<div class="submit-bar">
<button class="btn-submit" id="genBtn" onclick="generateResult()">✅ 填完了，提交问卷</button>
</div>
</div>

<div class="result-overlay" id="resultOverlay">
<div class="result-box">
<h3>✅ 问卷已生成</h3>
<div class="info">请将下方链接发送给老师<br>老师审阅后将发送你的性格分析报告（1-3个工作日）</div>
<div class="link-box" id="linkBox" style="display:block">
<input type="text" id="linkInput" readonly style="font-size:.8rem">
<div class="result-actions" style="margin-top:.5rem">
<button class="btn-copy" onclick="copyLink()" style="flex:1">📋 复制链接</button>
<button class="btn-link" onclick="sendByEmail()" style="flex:1">📧 发邮件</button>
</div>
</div>
<div class="result-actions" style="margin-top:.5rem">
<button class="btn-close" onclick="closeResult()">返回修改</button>
<button class="btn-submit" onclick="location.href='success.html'" style="background:var(--accent);color:#fff">已完成分享</button>
</div>
</div>
</div>

<form id="submitForm" action="https://formsubmit.co/121781953@qq.com" method="POST" style="display:none">
<input type="hidden" name="_subject" id="form_subject">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://cjmyy.github.io/personality-tool/success.html">
<input type="hidden" name="email" id="form_email">
<input type="hidden" name="问卷类型" id="form_mode">
<input type="hidden" name="姓名" id="form_bname">
<input type="hidden" name="工具链接" id="form_link">
<input type="hidden" name="问卷内容" id="form_content">
</form>

<div class="toast" id="toast"></div>

<script>
var currentMode='child';
(function(){var p=new URLSearchParams(location.search);var m=p.get('mode');if(m==='child'||m==='adult'||m==='teacher')setTimeout(function(){showForm(m)},100)})();

function showForm(mode){
  currentMode=mode;
  document.getElementById('modePage').style.display='none';
  document.getElementById('formPage').style.display='block';
  document.getElementById('formTitle').textContent=mode==='child'?'家庭教育问题诊断问卷':mode==='teacher'?'教师性格诊断问卷':'成人性格诊断问卷';
  renderQuestions();window.scrollTo(0,0);
}
function backToMode(){
  document.getElementById('formPage').style.display='none';
  document.getElementById('modePage').style.display='flex';
}

// ===== Render =====
function renderQuestions(){
  var c=document.getElementById('questions');var h='';
  if(currentMode==='child'){
    h+=section('基本信息',birthInfoBlock()+
      q(1,'孩子年龄',inputRow('age','','岁'))+
      q(2,'孩子性别',choiceRow('q2',[['男','男'],['女','女']]))+
      q(3,'孩子年级',inputText('grade','如：小学三年级'))+
      q(4,'是否独生子女',choiceRow('q4',[['是','是'],['否','否']])+inputText('q4_rank','排行第几（如有兄弟姐妹）'))+
      q(5,'主要抚养人',choiceCol('q5',[['母亲','母亲'],['父亲','父亲'],['爷奶/外公外婆','爷爷奶奶/外公外婆'],['其他','其他']]))
    );
    h+=section('开窍状态自测','<div class="q-hint">根据孩子真实表现选择</div>'+
      yesNoQ(6,'孩子是否明确知道学习对自己很重要？')+
      yesNoQ(7,'孩子在不想写作业时，能否自己主动去写？')+
      yesNoQ(8,'孩子是否能接纳学习的枯燥感，不被情绪打败？')+
      yesNoQ(9,'孩子遇到困难时是否不轻易放弃？')+
      yesNoQ(10,'孩子是否有"为家人做点什么"的意识？')+
      yesNoQ(11,'孩子犯错后，能否接受批评并做出调整？')
    );
    h+=section('认知模式',
      q(12,'别人指出问题时，孩子的第一反应',choiceCol('q12',[['否认或反驳','否认或反驳'],['沉默不语/逃避','沉默不语/逃避'],['接受并改正','接受并改正'],['无所谓/不在乎','无所谓/不在乎'],['看情况','看情况']]))+
      q(13,'孩子是否知道学习重要，但不去做？',choiceCol('q13',[['是','是'],['否','否'],['不确定','不确定']]))+
      q(14,'同样的错误，孩子是否会反复犯？',choiceCol('q14',[['是','是'],['否','否'],['不确定','不确定']]))
    );
    h+=section('性格特征','<div class="q-hint">每题选最符合孩子情况的：A=经常如此 B=有时如此 C=很少如此 D=几乎不</div>'+
      abcdQ(15,'孩子是否特别懂事，经常替别人着想？')+
      abcdQ(16,'孩子是否想很多、犹豫不决、容易焦虑？')+
      abcdQ(17,'孩子是否特别听话、服从管教、很在意面子？')+
      abcdQ(18,'孩子是否很不服管、越压越反抗、脾气倔？')+
      abcdQ(19,'孩子是否胆子大、敢冒险、花钱大手大脚？')+
      abcdQ(20,'孩子是否朋友特别多、离不开朋友、重情义？')+
      abcdQ(21,'孩子是否鬼点子多、坐不住、自控力差、爱吹牛？')+
      abcdQ(22,'孩子是否会吃会玩、心情好、有艺术细胞？')+
      abcdQ(23,'孩子是否智商高、能言善辩、喜欢对着干？')+
      abcdQ(24,'孩子是否谨慎本分、勤俭节约、重视家庭？')
    );
    h+=section('感统与发育',
      q(25,'孩子是否有以下表现（可多选）',checkboxCol('q25',[
        ['身体反应慢','身体反应慢（对指令反应迟钝）'],
        ['思维反应慢','思维反应慢（理解力跟不上同龄人）'],
        ['脾胃差、面色苍白','脾胃差、面色苍白'],
        ['注意力极容易被外界打断','注意力极容易被外界打断'],
        ['特别怕某种触感','特别怕某种触感（如衣服标签、沙子等）'],
        ['坐不住、小动作多','坐不住、小动作多'],
        ['写字歪歪扭扭、特别吃力','写字歪歪扭扭、特别吃力'],
        ['怕高、怕摇晃','怕高、怕摇晃（不敢荡秋千等）'],
        ['动作笨拙、经常摔跤','动作笨拙、经常摔跤'],
        ['对声音特别敏感','对声音特别敏感'],
        ['以上都没有','以上都没有']
      ]))+
      q(26,'孩子说话时间是否比同龄人晚？',choiceCol('q26',[['正常','正常'],['稍晚','稍晚'],['明显晚','明显晚'],['很晚/有过语言障碍','很晚/有过语言障碍']]))+
      q(27,'孩子小时候（3岁前）是否经常看电视/手机？',choiceCol('q27',[['几乎没有','几乎没有'],['偶尔','偶尔'],['经常','经常'],['非常多','非常多']]))+
      q(28,'孩子的精力水平如何？',choiceCol('q28',[['精力旺盛、停不下来','精力旺盛、停不下来'],['一般','一般'],['比较安静、容易累','比较安静、容易累'],['时好时坏，波动大','时好时坏，波动大']]))
    );
    h+=section('家庭环境',
      q(29,'父母关系状态',choiceCol('q29',[['和谐','和谐'],['一般','一般'],['经常争吵','经常争吵'],['分居','分居'],['离异','离异']]))+
      q(30,'家庭近期是否有重大变化？',choiceCol('q30',[['搬家/转学','搬家/转学'],['经济变故','经济变故'],['家人生病','家人生病'],['父母离异','父母离异'],['其他','其他'],['无','无']]))+
      q(31,'父母教育方式是否一致？',choiceCol('q31',[['完全一致','完全一致'],['基本一致','基本一致'],['经常不一致','经常不一致'],['完全对立','完全对立']]))
    );
    h+=section('当前核心问题',
      q(32,'你目前最担心孩子的问题是什么？（请详细描述，至少写3句话）',textarea('q32','例如：孩子最近两个月开始不想上学，每天早上都哭闹着不去。问他原因也不说，就把自己关在房间里玩手机。以前成绩还不错，现在作业也不写了……'))+
      q(33,'这个问题持续多久了？',choiceCol('q33',[['不到1个月','不到1个月'],['1-3个月','1-3个月'],['3-6个月','3-6个月'],['半年以上','半年以上']]))+
      q(34,'你目前用得最多的教育方式是：',choiceCol('q34',[['讲道理（反复跟他说）','讲道理（反复跟他说）'],['批评/吼（控制不住情绪）','批评/吼（控制不住情绪）'],['奖励/惩罚（物质刺激）','奖励/惩罚（物质刺激）'],['放任不管（管不了就不管了）','放任不管（管不了就不管了）']])+inputText('q34_other','其他方式'))+
      q(35,'你和孩子的关系目前怎么样？',choiceCol('q35',[['很好，什么都聊','很好，什么都聊'],['一般，能沟通但不深入','一般，能沟通但不深入'],['不太好，经常吵架','不太好，经常吵架'],['很差，基本不说话','很差，基本不说话']]))
    );
  } else if(currentMode==='teacher'){
    h+=section('基本信息',birthInfoBlock()+
      q(1,'你的教龄',inputRow('age','','年'))+
      q(2,'你的性别',choiceRow('q2',[['男','男'],['女','女']]))+
      q(3,'任教学科',choiceCol('q3',[['语文','语文'],['数学','数学'],['英语','英语'],['理科(物化生)','理科(物化生)'],['文科(政史地)','文科(政史地)'],['体音美','体音美'],['信息技术','信息技术'],['其他','其他']])+inputText('q3_other','其他学科'))+
      q(4,'目前是否担任班主任',choiceCol('q4',[['是','是'],['否','否'],['曾经担任','曾经担任']]))+
      q(5,'任教年级',choiceCol('q5',[['幼儿园','幼儿园'],['小学低段(1-3年级)','小学低段(1-3年级)'],['小学高段(4-6年级)','小学高段(4-6年级)'],['初中','初中'],['高中','高中'],['其他','其他']]))
    );
    h+=section('职业状态','<div class="q-hint">根据你真实的职业感受选择</div>'+
      q(6,'你当初选择当老师的原因',choiceCol('q6',[['真心热爱教育事业','真心热爱教育事业'],['家人建议/长辈期望','家人建议/长辈期望'],['看中稳定有编制','看中稳定有编制'],['分数够了就报了','分数够了就报了'],['其他','其他']]))+
      q(7,'你现在的教学热情',choiceCol('q7',[['依然充满热情，享受课堂','依然充满热情，享受课堂'],['还行，偶尔有倦怠感','还行，偶尔有倦怠感'],['经常觉得累，硬撑着','经常觉得累，硬撑着'],['几乎耗尽，每天不想去','几乎耗尽，每天不想去']]))+
      q(8,'你觉得自己的付出与回报',choiceCol('q8',[['完全匹配','完全匹配'],['基本匹配','基本匹配'],['不太匹配','不太匹配'],['严重不匹配','严重不匹配']]))+
      q(9,'过去一年，你是否有"不想干了"的念头',choiceCol('q9',[['经常有','经常有'],['偶尔有','偶尔有'],['很少','很少'],['从来没有','从来没有']]))+
      q(10,'你在学校里的人际关系',choiceCol('q10',[['很好，和同事相处融洽','很好，和同事相处融洽'],['还行，能配合工作','还行，能配合工作'],['有些紧张','有些紧张'],['比较孤立','比较孤立']]))+
      q(11,'你对当前的职业发展前景',choiceCol('q11',[['充满信心，有清晰规划','充满信心，有清晰规划'],['还行，走一步看一步','还行，走一步看一步'],['比较迷茫','比较迷茫'],['很悲观','很悲观']]))
    );
    h+=section('性格自评','<div class="q-hint">每题选最符合你的：A=经常如此 B=有时如此 C=很少如此 D=几乎不</div>'+
      abcdQ(12,'你是否特别在意别人的感受，经常委屈自己成全别人，很难说"不"？')+
      abcdQ(13,'你是否经常想很多、犹豫不决、容易陷入内耗，别人一句话你能琢磨半天？')+
      abcdQ(14,'你是否做事特别有计划、重视规则和秩序，在意面子和名声，不喜欢出格？')+
      abcdQ(15,'你是否骨子里不服管，越被施压越想反抗，别人越说你不行你越要证明给他看？')+

// ===== HTML generators =====
function section(title,body){return '<div class="section"><div class="section-title">'+title+'</div><div class="section-body">'+body+'</div></div>'}
function q(num,text,body){return '<div class="q"><div class="q-text"><span class="q-num">'+num+'.</span>'+text+'</div>'+body+'</div>'}
function inputText(id,ph){return '<input type="text" class="input-text" id="'+id+'" placeholder="'+(ph||'')+'">'}
function inputRow(id,ph,unit){return '<div class="input-row"><input type="text" class="input-text" id="'+id+'" placeholder="'+(ph||'')+'"><span class="unit">'+(unit||'')+'</span></div>'}
function textarea(id,ph){return '<textarea class="input-text" id="'+id+'" placeholder="'+(ph||'')+'"></textarea>'}
function choiceRow(name,opts){var h='<div class="choice-row">';opts.forEach(function(o){h+='<label class="choice"><input type="radio" name="'+name+'" value="'+o[0]+'"><span>'+o[1]+'</span></label>'});return h+'</div>'}
function choiceCol(name,opts){var h='';opts.forEach(function(o){h+='<label class="choice"><input type="radio" name="'+name+'" value="'+o[0]+'"><span>'+o[1]+'</span></label>'});return h}
function checkboxCol(name,opts){var h='';opts.forEach(function(o){h+='<label class="choice"><input type="checkbox" name="'+name+'" value="'+o[0]+'"><span>'+o[1]+'</span></label>'});return h}
function abcdQ(num,text){return '<div class="q"><div class="q-text"><span class="q-num">'+num+'.</span>'+text+'</div><div class="choice-row"><label class="choice"><input type="radio" name="q'+num+'" value="A"><span>A 经常如此</span></label><label class="choice"><input type="radio" name="q'+num+'" value="B"><span>B 有时如此</span></label><label class="choice"><input type="radio" name="q'+num+'" value="C"><span>C 很少如此</span></label><label class="choice"><input type="radio" name="q'+num+'" value="D"><span>D 几乎不</span></label></div></div>'}
function yesNoQ(num,text){return '<div class="q"><div class="q-text"><span class="q-num">'+num+'.</span>'+text+'</div><div class="choice-row"><label class="choice"><input type="radio" name="q'+num+'" value="是"><span>是</span></label><label class="choice"><input type="radio" name="q'+num+'" value="否"><span>否</span></label><label class="choice"><input type="radio" name="q'+num+'" value="不确定"><span>不确定</span></label></div></div>'}
function birthInfoBlock(){
  return '<div class="q"><div class="q-text">姓名</div>'+inputText('bname','填写姓名')+'</div>'+
    '<div class="q"><div class="q-text">联系邮箱 <span style="color:#dc2626">*</span></div>'+inputText('bemail','填写你的邮箱')+'<div class="q-hint">报告将发送到此邮箱，请确保填写正确</div></div>'+

    '<div class="q"><div class="q-text">出生时间（24小时制，精确到分，不确定填"不详"）</div><div class="input-row"><input type="number" class="input-text" id="bhour" placeholder="14" min="0" max="23"><span class="unit">时</span><input type="number" class="input-text" id="bminute" placeholder="30" min="0" max="59"><span class="unit">分</span></div><div class="q-hint">尽量填准确，关系到性格分析精准度。不知道填"不详"即可</div></div>'+

}

// ===== Get values =====
function val(id){var el=document.getElementById(id);return el?el.value.trim():''}
function radioVal(name){var c=document.querySelector('input[name="'+name+'"]:checked');return c?c.value:''}
function checkboxVals(name){var c=document.querySelectorAll('input[name="'+name+'"]:checked');return Array.prototype.map.call(c,function(x){return x.value})}

// ===== Format helpers =====
function fmtAbcd(a){var o=['A','B','C','D'],p=[];o.forEach(function(x){p.push(x+(a===x?'■':'□'))});return p.join(' ')}
function fmtYN(v){return (v==='是'?'■是':'□是')+' '+(v==='否'?'■否':'□否')+' '+(v==='不确定'?'■不确定':'□不确定')}
function fmtSingle(val,opts){var p=[];opts.forEach(function(o){p.push((val===o[0]?'■':'□')+o[1])});return p.join(' ')}
function fmtMulti(vals,opts){var p=[];opts.forEach(function(o){p.push((vals.indexOf(o[0])>=0?'■':'□')+o[1])});return p.join(' ')}

// ===== URL hash encoding =====
function generateLink(){
  var result=document.getElementById('resultText').value;
  if(!result){showToast('请先生成结果');return}
  var utf8=unescape(encodeURIComponent(result));
  var b64;try{b64=btoa(utf8)}catch(e){showToast('编码失败');return}
  var base=location.origin+location.pathname.replace(/questionnaire\.html.*$/,'');
  if(!base.endsWith('/'))base+='/';
  var link=base+'#q='+encodeURIComponent(b64)+'&mode='+currentMode;
  var input=document.getElementById('linkInput');
  input.value=link;
  input.select();
  document.getElementById('linkBox').classList.add('show');
  showToast('链接已生成，请复制发给老师');
}

function copyLink(){
  var input=document.getElementById('linkInput');
  input.select();input.setSelectionRange(0,99999);
  var ok=false;try{ok=document.execCommand('copy')}catch(e){}

  showToast('链接已复制！请发给老师');
}
