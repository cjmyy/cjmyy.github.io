<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>提交成功</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f8fafc;display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0;padding:1rem}
.card{background:#fff;border-radius:16px;padding:2.2rem 1.5rem;text-align:center;max-width:400px;width:100%;box-shadow:0 4px 20px rgba(26,54,93,.08);border:1px solid #e2e8f0}
.icon{font-size:3.5rem;margin-bottom:1rem}
.card h1{font-size:1.3rem;color:#1a365d;margin-bottom:.5rem;letter-spacing:.05em}
.card p{color:#64748b;font-size:.9rem;line-height:1.6;margin-bottom:.3rem}
.card .tip{margin-top:1.2rem;padding:.8rem 1rem;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;font-size:.8rem;color:#166534;text-align:left}
</style>
</head>
<body>
<div class="card">
<div class="icon">✅</div>
<h1>问卷提交成功！</h1>
<p>老师已收到你的问卷信息</p>
<p>将在 <strong>1-3个工作日</strong> 内完成分析</p>
<p>报告会发送到你填写的邮箱</p>
<div class="tip">📧 请留意邮箱，包括垃圾邮件夹<br>🕐 如3个工作日未收到，请检查邮箱是否正确<br>💬 有疑问可联系购买平台的客服</div>
</div>
</body>
</html>
