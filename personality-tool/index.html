<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>性格解码 · 成长心理画像</title>
<style>
:root{
  --primary:#6d28d9;--primary-l:#8b5cf6;--primary-d:#4c1d95;
  --accent:#f59e0b;--accent-l:#fbbf24;
  --bg:#f5f3ff;--card:#fff;--text:#1e1b2e;--text-l:#6b7280;
  --border:#e9d5ff;--success:#059669;--error:#dc2626;
  --radius:16px;--shadow:0 8px 30px rgba(109,40,217,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ===== Password Gate ===== */
#lockScreen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4c1d95 0%,#6d28d9 40%,#7c3aed 70%,#6366f1 100%);overflow:hidden}
#lockScreen::before{content:'';position:absolute;top:-60%;left:-30%;width:160%;height:220%;background:radial-gradient(ellipse at center,rgba(251,191,36,.08) 0%,transparent 55%);animation:drift 25s ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0) rotate(0)}100%{transform:translate(30px,20px) rotate(5deg)}}
.lock-card{position:relative;z-index:1;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:2.5rem 2rem;width:90%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lock-icon{font-size:3rem;margin-bottom:.5rem;display:inline-block;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.8}}
.lock-title{color:#fff;font-size:1.5rem;font-weight:800;letter-spacing:.05em;margin-bottom:.3rem}
.lock-title span{color:var(--accent-l)}
.lock-subtitle{color:rgba(255,255,255,.7);font-size:.82rem;margin-bottom:1.8rem;font-weight:300}
.lock-input-wrap{position:relative;margin-bottom:1rem}
.lock-input{width:100%;padding:.85rem 1rem .85rem 2.8rem;border:1.5px solid rgba(255,255,255,.2);border-radius:12px;font-size:1rem;background:rgba(255,255,255,.1);color:#fff;transition:all .25s;letter-spacing:.05em}
.lock-input::placeholder{color:rgba(255,255,255,.4)}
.lock-input:focus{outline:none;border-color:var(--accent-l);box-shadow:0 0 0 3px rgba(251,191,36,.15);background:rgba(255,255,255,.15)}
.lock-input-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);font-size:1.1rem;opacity:.6}
.lock-btn{width:100%;padding:.9rem;border:none;border-radius:12px;font-size:1.05rem;font-weight:700;color:#4c1d95;cursor:pointer;background:linear-gradient(135deg,var(--accent-l) 0%,var(--accent) 100%);box-shadow:0 6px 20px rgba(245,158,11,.3);transition:all .25s;letter-spacing:.08em}
.lock-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,158,11,.4)}
.lock-btn:active:not(:disabled){transform:translateY(0)}
.lock-btn:disabled{opacity:.6;cursor:wait}
.lock-error{color:#fca5a5;font-size:.85rem;margin-top:.8rem;min-height:1.2rem;display:none;animation:shake .4s ease}
.lock-error.show{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.lock-hint{color:rgba(255,255,255,.4);font-size:.72rem;margin-top:1.2rem;line-height:1.5}
.lock-spinner{display:none;width:40px;height:40px;margin:1rem auto 0;border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent-l);border-radius:50%;animation:spin .8s linear infinite}
.lock-spinner.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Main App (hidden until unlocked) ===== */
#mainApp{display:none}
#mainApp.show{display:block}

.header{background:linear-gradient(135deg,#4c1d95 0%,#6d28d9 40%,#7c3aed 70%,#6366f1 100%);color:#fff;padding:2.5rem 1rem 3rem;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-60%;left:-30%;width:160%;height:220%;background:radial-gradient(ellipse at center,rgba(251,191,36,.08) 0%,transparent 55%);animation:drift 25s ease-in-out infinite alternate}
.header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:40px;background:var(--bg);clip-path:polygon(0 100%,100% 100%,100% 0,0 60%)}
.header h1{font-size:1.7rem;font-weight:800;letter-spacing:.05em;position:relative;z-index:1}
.header h1 span{color:var(--accent-l)}
.header .subtitle{margin-top:.4rem;font-size:.85rem;opacity:.8;font-weight:300;position:relative;z-index:1}
.header .badge{display:inline-block;margin-top:.8rem;padding:.25rem .9rem;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);border-radius:99px;font-size:.72rem;letter-spacing:.1em;position:relative;z-index:1}

.container{max-width:820px;margin:0 auto;padding:0 1rem 3rem;position:relative;z-index:2}

.card{background:var(--card);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;box-shadow:var(--shadow);border:1px solid rgba(109,40,217,.04)}
.card-title{font-size:1.05rem;font-weight:700;color:var(--primary-d);margin-bottom:1rem;padding-bottom:.6rem;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:.4rem}

.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.form-group{margin-bottom:.7rem}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text-l);margin-bottom:.25rem;letter-spacing:.02em}
.form-group input,.form-group select{width:100%;padding:.65rem .7rem;border:1.5px solid var(--border);border-radius:10px;font-size:.92rem;background:#fdfcff;transition:all .2s;color:var(--text)}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary-l);box-shadow:0 0 0 3px rgba(139,92,246,.12)}
@media(max-width:560px){.form-grid,.form-grid-2{grid-template-columns:1fr 1fr}}

.chk-row{display:flex;align-items:center;gap:.4rem;margin:.6rem 0;cursor:pointer;user-select:none}
.chk-row input{width:18px;height:18px;accent-color:var(--primary)}
.chk-row label{font-size:.85rem;font-weight:600;color:var(--text-l);cursor:pointer}

.collapse{max-height:0;overflow:hidden;transition:max-height .35s ease}
.collapse.open{max-height:600px}
.collapse-inner{padding-top:.5rem}
.collapse textarea{width:100%;padding:.6rem;border:1.5px solid var(--border);border-radius:10px;font-size:.82rem;font-family:monospace;min-height:120px;resize:vertical;background:#fdfcff;line-height:1.5}
.hint{font-size:.72rem;color:#9ca3af;margin-top:.2rem}

.btn-generate{width:100%;padding:.95rem;border:none;border-radius:12px;font-size:1.05rem;font-weight:700;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-d) 100%);box-shadow:0 6px 20px rgba(109,40,217,.3);transition:all .25s;letter-spacing:.05em}
.btn-generate:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(109,40,217,.4)}
.btn-generate:active:not(:disabled){transform:translateY(0)}
.btn-generate:disabled{opacity:.6;cursor:wait}

.loading{display:none;text-align:center;padding:2.5rem 1rem}
.loading.show{display:block}
.spinner{width:44px;height:44px;margin:0 auto 1rem;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
.loading p{color:var(--text-l);font-size:.9rem}

.error-box{display:none;background:#fef2f2;border:1px solid #fecaca;color:var(--error);padding:.9rem 1rem;border-radius:10px;margin-top:1rem;font-size:.88rem}
.error-box.show{display:block}

.result{display:none;animation:fadeUp .5s ease}
.result.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(109,40,217,.04)}
.result-toolbar{display:flex;gap:.4rem;padding:.8rem 1rem;background:#faf8ff;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.result-toolbar .tag{flex:1;font-size:.78rem;color:var(--text-l);font-weight:600}
.btn-sm{padding:.45rem .9rem;border:1px solid var(--border);background:#fff;color:var(--text-l);border-radius:8px;font-size:.8rem;cursor:pointer;transition:all .2s;font-weight:600}
.btn-sm:hover{background:var(--primary);color:#fff;border-color:var(--primary)}

.report-body{padding:1.2rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.report-body pre{font-family:"SF Mono","Consolas","Courier New",monospace;font-size:.78rem;line-height:1.65;white-space:pre-wrap;word-break:break-all;color:var(--text)}
@media(min-width:768px){.report-body pre{font-size:.85rem}}
.hl-section{color:var(--primary-d);font-weight:700}
.hl-divider{color:var(--primary-l);opacity:.5}
.hl-bullet-star{color:var(--accent);font-weight:700}
.hl-bullet-warn{color:#f97316;font-weight:700}
.hl-bullet-ok{color:var(--success);font-weight:700}
.hl-bullet-no{color:var(--error);font-weight:700}
.hl-bullet-talk{color:#3b82f6;font-weight:700}
.hl-arrow{color:var(--primary);font-weight:700}
.hl-num{color:var(--primary);font-weight:700;background:rgba(139,92,246,.1);padding:0 2px;border-radius:4px}

.footer{text-align:center;padding:2rem 1rem;color:#9ca3af;font-size:.72rem;line-height:1.6}
.footer a{color:var(--primary-l);text-decoration:none}

@media print{
  #lockScreen{display:none!important}
  .header,.card,.footer,.result-toolbar{display:none}
  #mainApp{display:block!important}
  .result{display:block!important}
  .result-card{box-shadow:none;border:none}
  .report-body{padding:0}
}
</style>
</head>
<body>

<!-- ===== Password Gate ===== -->
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">性格<span>解码</span></div>
    <div class="lock-subtitle">请输入访问密码以解锁工具</div>
    <div class="lock-input-wrap">
      <span class="lock-input-icon">🔑</span>

  </div>
</div>

<!-- ===== Main App ===== -->
<div id="mainApp">
<div class="header">
  <h1>性格<span>解码</span></h1>
  <div class="subtitle">成长心理画像 · 人格特质画像</div>
  <div class="badge">基于30年一线教育经验 · 心理学框架</div>
</div>
<div class="container">
  <div class="card">
    <div class="card-title">📋 基本信息</div>
    <form id="form">
      <div class="form-grid">

      </div>

      <div class="card-title" style="margin-top:1.2rem">⚙️ 报告选项</div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>报告模式</label>
          <select id="mode">
            <option value="child">孩子版 · 成长心理画像</option>
            <option value="adult">成人版 · 人格特质画像</option>

        </div>
        <div class="form-group">
          <label>报告版本</label>
          <select id="version">

            <option value="delivery">交付版（心理学包装）</option>

        </div>

      <div class="chk-row">
        <input type="checkbox" id="useSensory">
        <label for="useSensory">附加感统量表评估（仅孩子版可用）</label>

      <div class="collapse" id="sensoryCollapse">
        <div class="collapse-inner">
          <div class="form-group">
            <label>感统量表答案（55题，每行一个数字1-5）</label>
            <textarea id="sensoryAnswers" placeholder="5&#10;4&#10;3&#10;5&#10;2&#10;…（共55行）"></textarea>
            <div class="hint">评分：从不=5 · 很少=4 · 偶尔=3 · 经常=2 · 总是=1</div>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-generate" id="btnGen" style="margin-top:.8rem">🔮 生成报告</button>
    </form>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>正在排盘分析，生成报告中…</p>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result" id="result">
    <div class="result-card">
      <div class="result-toolbar">
        <span class="tag" id="resultTag"></span>
        <button class="btn-sm" onclick="copyReport()">📋 复制</button>
        <button class="btn-sm" onclick="downloadReport()">💾 下载</button>
        <button class="btn-sm" onclick="window.print()">🖨️ 打印</button>
      </div>
      <div class="report-body">
        <pre id="reportHtml"></pre>
      </div>
    </div>
  </div>

  <div class="footer">
    本工具基于性格分析理论框架生成，所有判断规则来源于系统化整理的知识库。<br>
    仅供参考，不构成任何医学、心理诊断或教育承诺。
  </div>
</div>
</div>

<!-- ===== Lunar.js (public library, not encrypted) ===== -->
<script src="lunar.js"></script>

<!-- ===== Encrypted Data & Unlock Logic ===== -->
<script>
// Public crypto parameters (no secret here — salt/iv are safe to expose)
const CRYPTO_SALT = "3IFm9OOrarCdhJOmNo5j+Q==";
const CRYPTO_ITERATIONS = 100000;

// Base64 → Uint8Array
function b64ToU8(b64) {
  const raw = atob(b64);
  const u8 = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) u8[i] = raw.charCodeAt(i);
  return u8;
}

// Derive AES-GCM key from password via PBKDF2
async function deriveKey(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: b64ToU8(CRYPTO_SALT), iterations: CRYPTO_ITERATIONS, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

// Decrypt one encrypted file (base64 string) → plaintext string
async function decryptFile(encryptedB64, aesKey) {
  const combined = b64ToU8(encryptedB64);
  // Layout: [iv(12)] [authTag(16)] [ciphertext(rest)]
  const iv = combined.slice(0, 12);
  const authTag = combined.slice(12, 28);
  const ciphertext = combined.slice(28);
  // Web Crypto expects authTag appended to ciphertext
  const cipherWithTag = new Uint8Array(ciphertext.length + authTag.length);
  cipherWithTag.set(ciphertext, 0);
  cipherWithTag.set(authTag, ciphertext.length);

  const decrypted = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: iv },
    aesKey,
    cipherWithTag
  );
  return new TextDecoder().decode(decrypted);
}

// Execute decrypted JS in global scope
function executeJS(code) {
  // Use indirect eval to run in global scope
  (0, eval)(code);
}

let unlocked = false;

async function attemptUnlock() {
  const pwdInput = document.getElementById('pwdInput');
  const unlockBtn = document.getElementById('unlockBtn');
  const lockError = document.getElementById('lockError');
  const lockSpinner = document.getElementById('lockSpinner');
  const password = pwdInput.value.trim();

  if (!password) {
    pwdInput.focus();
    return;
  }

  unlockBtn.disabled = true;
  unlockBtn.textContent = '解锁中…';
  lockError.classList.remove('show');
  lockSpinner.classList.add('show');

  try {
    // Step 1: Derive key from password
    const aesKey = await deriveKey(password);

    // Step 2: Fetch the encrypted bundle (single JSON file)
    const resp = await fetch('encrypted_bundle.json');
    if (!resp.ok) throw new Error('加密数据加载失败');
    const bundle = await resp.json();

    const fileOrder = ['data.js', 'app.js', 'report.js'];
    const decryptedCodes = [];
    for (const fname of fileOrder) {
      const encryptedB64 = bundle[fname];
      const decrypted = await decryptFile(encryptedB64, aesKey);
      decryptedCodes.push(decrypted);
    }

    // Step 3: Execute decrypted JS in order
    for (const code of decryptedCodes) {
      executeJS(code);
    }

    // Step 4: Show main app
    unlocked = true;
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainApp').classList.add('show');

    // Initialize app
    initApp();

  } catch (err) {
    lockError.classList.add('show');
    pwdInput.value = '';
    pwdInput.focus();
  } finally {
    unlockBtn.disabled = false;
    unlockBtn.textContent = '解锁';
    lockSpinner.classList.remove('show');
  }
}

// Enter key support
document.getElementById('pwdInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    attemptUnlock();
  }
});

// ===== Main App Logic (same as original) =====
function initApp() {
  let currentReport = '';

  const sensoryChk = document.getElementById('useSensory');
  const sensoryCol = document.getElementById('sensoryCollapse');
  const modeSel = document.getElementById('mode');

  function updateSensory(){
    const childMode = modeSel.value === 'child';
    const checked = sensoryChk.checked;
    if(childMode && checked){
      sensoryCol.classList.add('open');
    } else {
      sensoryCol.classList.remove('open');
      if(!childMode) sensoryChk.checked = false;
    }
  }
  sensoryChk.addEventListener('change', updateSensory);
  modeSel.addEventListener('change', updateSensory);

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  function formatReport(text){
    let lines = text.split('\n');
    let out = '';
    for(let line of lines){
      let e = esc(line);
      if(/═{10,}/.test(line)){out += '<span class="hl-divider">'+e+'</span>\n'; continue;}
      if(/─{15,}/.test(line)){out += '<span class="hl-divider">'+e+'</span>\n'; continue;}
      let secMatch = line.match(/^(\s*)([一二三四五六七八九十]+、)(.+)$/);
      if(secMatch){
        out += secMatch[1]+'<span class="hl-section">'+esc(secMatch[2]+secMatch[3])+'</span>\n';
        continue;
      }
      if(line.includes('发展倾向速览') || line.includes('性格速览') || line.includes('报告说明') || line.includes('评估基础信息')){
        out += '<span class="hl-section">'+e+'</span>\n'; continue;
      }
      if(/^\s*★/.test(line)){out += '<span class="hl-bullet-star">'+e+'</span>\n'; continue;}
      if(/^\s*⚠/.test(line)){out += '<span class="hl-bullet-warn">'+e+'</span>\n'; continue;}
      if(/^\s*✓/.test(line)){out += '<span class="hl-bullet-ok">'+e+'</span>\n'; continue;}
      if(/^\s*✗/.test(line)){out += '<span class="hl-bullet-no">'+e+'</span>\n'; continue;}
      if(/^\s*💬/.test(line)){out += '<span class="hl-bullet-talk">'+e+'</span>\n'; continue;}
      e = e.replace(/→/g,'<span class="hl-arrow">→</span>');
      e = e.replace(/([①②③④⑤⑥⑦⑧⑨⑩])/g,'<span class="hl-num">$1</span>');
      e = e.replace(/(✓)/g,'<span class="hl-bullet-ok">$1</span>');
      e = e.replace(/(✗)/g,'<span class="hl-bullet-no">$1</span>');
      e = e.replace(/(★)/g,'<span class="hl-bullet-star">$1</span>');
      e = e.replace(/(⚠)/g,'<span class="hl-bullet-warn">$1</span>');
      e = e.replace(/(💬)/g,'<span class="hl-bullet-talk">$1</span>');
      out += e + '\n';
    }
    return out;
  }

  document.getElementById('form').addEventListener('submit', function(e){
    e.preventDefault();
    const btn = document.getElementById('btnGen');
    const loading = document.getElementById('loading');
    const errorBox = document.getElementById('errorBox');
    const result = document.getElementById('result');

    btn.disabled = true;
    btn.textContent = '⏳ 分析中…';
    loading.classList.add('show');
    errorBox.classList.remove('show');
    result.classList.remove('show');

    try {
      const year = +document.getElementById('year').value;
      const month = +document.getElementById('month').value;
      const day = +document.getElementById('day').value;
      const hour = +document.getElementById('hour').value;
      const minute = +document.getElementById('minute').value;
      const gender = document.getElementById('gender').value;
      const birthplace = document.getElementById('birthplace').value;
      const mode = document.getElementById('mode').value;
      const delivery = document.getElementById('version').value === 'delivery';
      const useSensory = document.getElementById('useSensory').checked;
      const sensoryRaw = document.getElementById('sensoryAnswers').value;

      let sensoryAnswers = null;
      if (useSensory && mode === 'child' && sensoryRaw.trim()) {
        sensoryAnswers = sensoryRaw.trim().split('\n').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
      }

      const report = new PersonalityReport();
      const output = delivery ? 'delivery' : 'full';
      const reportText = report.generate(year, month, day, hour, minute, false, gender, birthplace, false, mode, output, sensoryAnswers);

      currentReport = reportText;
      document.getElementById('reportHtml').innerHTML = formatReport(reportText);

      const tag = document.getElementById('resultTag');
      const modeTxt = mode === 'child' ? '孩子版' : '成人版';
      const verTxt = delivery ? '交付版' : '主人版';
      tag.textContent = modeTxt + ' · ' + verTxt + ' · ' + year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');

      result.classList.add('show');
      result.scrollIntoView({behavior:'smooth', block:'start'});
    } catch(err) {
      errorBox.textContent = '❌ ' + (err.message || err);
      errorBox.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = '🔮 生成报告';
      loading.classList.remove('show');
    }
  });

  window.copyReport = function(){
    navigator.clipboard.writeText(currentReport).then(()=>{
      alert('✅ 报告已复制到剪贴板');
    }).catch(()=>{
      const ta = document.createElement('textarea');
      ta.value = currentReport;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      alert('✅ 报告已复制到剪贴板');
    });
  };

  window.downloadReport = function(){
    const blob = new Blob([currentReport],{type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '性格报告.txt';
    a.click();
    URL.revokeObjectURL(url);
  };
}
</script>
</body>
</html>
